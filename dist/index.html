<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ishikawa FIN</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="min-h-screen flex flex-col font-sans bg-neutral text-neutral-1000 antialiased">

    <header class="w-full px-6 py-4 flex items-center gap-3 border-b border-neutral-200">
        <span
            class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-brand-600 text-white text-sm font-semibold">
            F
        </span>
        <span class="font-semibold text-base tracking-tight">Ishikawa FIN</span>
    </header>

    <div class="flex flex-1 min-h-0">

        <aside
            class="hidden md:flex flex-col justify-between bg-white border-r border-r-gray-200 self-stretch w-[272px] shrink-0">

            <div class="px-4">
                <div class="flex h-[72px] items-center px-2">
                    <a href="/dashboard" class="flex items-center gap-2">
                        <span class="text-2xl font-bold leading-none" style="color: hsl(171 95% 34%);">€</span>
                        <span class="text-base font-semibold text-gray-900 tracking-tight">Ishikawa Fin</span>
                    </a>
                </div>

                <nav class="flex flex-col pt-2">

                    <span class="px-2 pb-1 pt-3 text-[11px] font-semibold uppercase tracking-wider text-gray-400">
                        Gerencia
                    </span>

                    <a href="/dashboard"
                        class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-900 bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="shrink-0 text-gray-500">
                            <rect width="7" height="7" x="3" y="3" rx="1" />
                            <rect width="7" height="7" x="14" y="3" rx="1" />
                            <rect width="7" height="7" x="14" y="14" rx="1" />
                            <rect width="7" height="7" x="3" y="14" rx="1" />
                        </svg>
                        <span>Dashboard</span>
                    </a>

                    <a href="/movimentacoes"
                        class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="shrink-0">
                            <line x1="8" y1="6" x2="21" y2="6" />
                            <line x1="8" y1="12" x2="21" y2="12" />
                            <line x1="8" y1="18" x2="21" y2="18" />
                            <line x1="3" y1="6" x2="3.01" y2="6" />
                            <line x1="3" y1="12" x2="3.01" y2="12" />
                            <line x1="3" y1="18" x2="3.01" y2="18" />
                        </svg>
                        <span>Movimentações</span>
                    </a>

                    <a href="/categorias"
                        class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="shrink-0">
                            <path d="M12 2H2v10l9.29 9.29a1 1 0 0 0 1.41 0l7.29-7.29a1 1 0 0 0 0-1.41L12 2Z" />
                            <path d="M7 7h.01" />
                        </svg>
                        <span>Categorias</span>
                    </a>

                    <a href="/historico"
                        class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="shrink-0">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <span>Histórico</span>
                    </a>

                    <span class="px-2 pb-1 pt-5 text-[11px] font-semibold uppercase tracking-wider text-gray-400">
                        Atalhos
                    </span>

                    <a href="/usuarios"
                        class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="shrink-0">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                        <span>Usuários</span>
                    </a>

                    <a href="/configuracoes"
                        class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="shrink-0">
                            <path
                                d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <span>Configurações</span>
                    </a>

                </nav>
            </div>

            <div class="border-t border-gray-100 px-4 py-3">
                <div
                    class="flex items-center gap-3 rounded-md px-2 py-2 hover:bg-gray-50 cursor-pointer transition-colors">
                    <img src="https://i.pravatar.cc/40?u=alexandre" alt="Alexandre Ishikawa"
                        class="h-8 w-8 rounded-full object-cover shrink-0" />
                    <div class="flex flex-col min-w-0">
                        <span class="text-sm font-medium text-gray-900 truncate">Alexandre Ishikawa</span>
                        <span class="text-xs text-gray-400 truncate">alexandre@gmail.com</span>
                    </div>
                </div>
            </div>

        </aside>

        <main class="flex flex-1 flex-col items-center justify-center px-6 py-20 text-center overflow-auto">
            <h1 class="text-5xl font-bold tracking-tight leading-tight max-w-xl">
                Hello, <span class="text-brand-600">World!</span>
            </h1>
        </main>

    </div>

    <footer class="hidden md:block w-full px-6 py-4 text-center text-xs bg-neutral-200 text-neutral-1000/40">
        Projeto acadêmico · 2026
    </footer>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 flex items-stretch bg-white border-t border-gray-200 z-50">
        <a href="/dashboard"
            class="flex flex-1 flex-col items-center justify-center gap-1 pt-3 pb-4 text-[10px] font-medium relative"
            style="color: hsl(171 95% 34%);">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="7" height="7" x="3" y="3" rx="1" />
                <rect width="7" height="7" x="14" y="3" rx="1" />
                <rect width="7" height="7" x="14" y="14" rx="1" />
                <rect width="7" height="7" x="3" y="14" rx="1" />
            </svg>
            <span>Dashboard</span>
            <!-- underline ativo -->
            <span class="absolute top-0 left-1/2 -translate-x-1/2 h-0.5 w-8 rounded-full"
                style="background-color: hsl(171 95% 34%);"></span>
        </a>
        <a href="/movimentacoes"
            class="flex flex-1 flex-col items-center justify-center gap-1 pt-3 pb-4 text-[10px] font-medium text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            <span>Movimentações</span>
        </a>
        <a href="/categorias"
            class="flex flex-1 flex-col items-center justify-center gap-1 pt-3 pb-4 text-[10px] font-medium text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2H2v10l9.29 9.29a1 1 0 0 0 1.41 0l7.29-7.29a1 1 0 0 0 0-1.41L12 2Z" />
                <path d="M7 7h.01" />
            </svg>
            <span>Categorias</span>
        </a>
        <a href="/historico"
            class="flex flex-1 flex-col items-center justify-center gap-1 pt-3 pb-4 text-[10px] font-medium text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg>
            <span>Histórico</span>
        </a>
        <a href="#"
            class="flex flex-1 flex-col items-center justify-center gap-1 pt-3 pb-4 text-[10px] font-medium text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
            <span>Menu</span>
        </a>

    </nav>

    <div class="md:hidden h-16"></div>

</body>

</html>
